name: Merge Check (Dev)

on:
  pull_request:
    branches: [dev]

permissions:
  contents: read
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint Check
    uses: ./.github/workflows/lint.yml

  unit-tests:
    name: Unit Tests
    uses: ./.github/workflows/unit-tests.yml
    with:
      variant: debug
