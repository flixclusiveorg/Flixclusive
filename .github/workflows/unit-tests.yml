# .github/workflows/unit-tests.yml
name: Unit Tests

on:
  workflow_call:
    inputs:
      variant:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      variant:
        required: true
        type: choice
        options: [ debug, preview, release ]
        description: "Select the build variant for which to run the tests."

permissions:
  contents: read
  checks: write

jobs:
  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: |
          VARIANT=${{ inputs.variant }}
          echo "Running unit tests for variant: $VARIANT"
          ./gradlew test${VARIANT^}UnitTest

      - name: Unit test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Test Results
          path: '**/build/test-results/**/TEST-*.xml'
          reporter: java-junit
