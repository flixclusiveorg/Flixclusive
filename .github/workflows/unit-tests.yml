name: Unit Tests

on:
  workflow_call:
    inputs:
      variant:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      variant:
        required: true
        type: choice
        options: [ debug, preview, release ]
        description: "Select the build variant for which to run the tests."

permissions:
  contents: read
  checks: write

jobs:
  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Check for test folders
        id: check-tests
        run: |
          TEST_DIRS=$(find . -type d -name "test" -path "*/src/test*" | grep -v "build/" | grep -v ".git/")
          if [ -n "$TEST_DIRS" ]; then
            echo "Test folders found:"
            echo "$TEST_DIRS"
            echo "has_tests=true" >> $GITHUB_OUTPUT
          else
            echo "No test folders found — skipping unit tests."
            echo "has_tests=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-java@v4
        if: steps.check-tests.outputs.has_tests == 'true'
        with:
          java-version: 17
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4
        if: steps.check-tests.outputs.has_tests == 'true'

      - name: Run unit tests
        if: steps.check-tests.outputs.has_tests == 'true'
        run: |
          VARIANT=${{ inputs.variant }}
          echo "Running unit tests for variant: $VARIANT"
          ./gradlew test${VARIANT^}UnitTest

      - name: Unit test results
        uses: dorny/test-reporter@v1
        if: steps.check-tests.outputs.has_tests == 'true' && always()
        with:
          name: Unit Test Results
          path: '**/build/test-results/**/TEST-*.xml'
          reporter: java-junit
