name: Unit Tests

on:
  pull_request:
    branches: [ dev, staging, main ]
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for test folders
        id: check-tests
        run: |
          TEST_DIRS=$(find . -type d -name "test" -path "*/src/test*" | grep -v "build/" | grep -v ".git/")
          if [ -n "$TEST_DIRS" ]; then
            echo "Test folders found:"
            echo "$TEST_DIRS"
            echo "has_tests=true" >> $GITHUB_OUTPUT
          else
            echo "No test folders found — skipping unit tests."
            echo "has_tests=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-java@v4
        if: steps.check-tests.outputs.has_tests == 'true'
        with:
          java-version: 17
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4
        if: steps.check-tests.outputs.has_tests == 'true'

      - name: Run unit tests
        if: steps.check-tests.outputs.has_tests == 'true'
        run: ./gradlew testUnitTest

      - name: Unit test results
        uses: dorny/test-reporter@v1
        if: steps.check-tests.outputs.has_tests == 'true' && always()
        with:
          name: Unit Test Results
          path: '**/build/test-results/**/TEST-*.xml'
          reporter: java-junit
